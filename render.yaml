services:
  - type: web
    name: delta-account-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerCommand: java -jar app.jar
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: delta_account
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
    region: oregon
    plan: free
