version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: delta-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-delta_account}
      MYSQL_USER: ${MYSQL_USER:-delta}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-delta123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    container_name: delta-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-delta_account}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      JWT_SECRET: ${JWT_SECRET:-delta-account-platform-jwt-secret-key-2026-dev-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: delta-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
